<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e40af"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="18" clip-path="url(#clip)" fill="url(#shine)"/>

  <!-- Envelope body -->
  <rect x="4.5" y="9" width="23" height="16.5" rx="2.5"
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.88)" stroke-width="1.6"/>

  <!-- Envelope V-fold -->
  <polyline points="4.5,10.2 16,19.5 27.5,10.2"
            stroke="rgba(255,255,255,0.88)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Fragment lines (content indicator) -->
  <line x1="8.5" y1="21" x2="15" y2="21"
        stroke="rgba(255,255,255,0.48)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="8.5" y1="23.5" x2="12.5" y2="23.5"
        stroke="rgba(255,255,255,0.48)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Small spark dot (transform indicator) -->
  <circle cx="24" cy="21" r="1.4" fill="rgba(255,255,255,0.55)"/>
  <circle cx="24" cy="21" r="0.7" fill="white"/>
</svg>
